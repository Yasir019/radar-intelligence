[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the Render backend (same-origin, no CORS needed)
[[redirects]]
  from = "/api/*"
  to = "https://radar-api-1mdq.onrender.com/api/:splat"
  status = 200

# SPA fallback for client-side routing (react-router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
